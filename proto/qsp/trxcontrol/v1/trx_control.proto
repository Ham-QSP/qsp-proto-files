syntax = "proto3";

package qsp.trxcontrol.v1;

message AgentControlMessage {
  oneof message {
    AgentMessage agent = 1;
    TransceiverMessage transceiver = 10;
  }
}

message AgentMessage {
  oneof agent_message {
    HelloCommand hello = 1;
  }
}
message HelloCommand {
  uint32 protocol_version_major = 1;
  uint32 protocol_version_minor = 2;
}

message TransceiverMessage {

  oneof transceiver_message {
    TrxFrequencyMessage frequency_message = 1;
    TrxModeMessage mode_message = 2;
    TrxBandMessage band_message = 3;
    TrxCapabilitiesMessage trx_capabilities_message = 4;
    TrxVfoOperationMessage trx_vfo_message = 5;
  }
}

message TrxFrequencyMessage {
  uint32 vfo_id = 1;
  uint64 frequency = 2;
}

message TrxModeMessage {
  uint32 vfo_id = 1;
  TrxVfoMode mode = 2;
}

message TrxBandMessage {
  uint32 vfo_id = 1;
  Band band = 2;
}
message TrxVfoOperationMessage {
  uint32 vfo_id = 1;
  TrxVfoOperation operation = 2;
}

message TrxCapabilitiesMessage {
  uint32 rig_model = 1;
  string model_name = 2;
  string manufacturer_name = 3;
  repeated RigFrequencyRangeMessage rx_frequency_ranges = 4;
  repeated RigFrequencyRangeMessage tx_frequency_ranges = 5;
}

message RigFrequencyRangeMessage {
  uint32 list_id = 1;
  uint64 lower_frequency_hz = 2;
  uint64 upper_frequency_hz = 3;
  repeated TrxVfoMode modes = 4;
  repeated TrxVfoFlag vfo = 5;
  repeated TrxAntenna antenna = 6;
  optional string label = 7;
}

enum TrxVfoFlag {
  TRX_VFO_FLAG_UNSPECIFIED = 0;
  TRX_VFO_FLAG_A = 1;
  TRX_VFO_FLAG_B = 2;
  TRX_VFO_FLAG_C = 3;
  TRX_VFO_FLAG_SUB_C = 4;
  TRX_VFO_FLAG_MAIN_C = 5;
  TRX_VFO_FLAG_OTHER = 6;
  TRX_VFO_FLAG_SUB_A = 7;
  TRX_VFO_FLAG_SUB_B = 8;
  TRX_VFO_FLAG_MAIN_A = 9;
  TRX_VFO_FLAG_MAIN_B = 10;
  TRX_VFO_FLAG_SUB = 11;
  TRX_VFO_FLAG_MAIN = 12;
  TRX_VFO_FLAG_VFO = 13;
  TRX_VFO_FLAG_MEM = 14;
  TRX_VFO_FLAG_CURR = 15;
  TRX_VFO_FLAG_TX_FLAG = 16;
}

