syntax = "proto3";

package qsp.trxcontrol.v1;

message AgentControlMessage {
    uint64 id = 1;
    uint64 responseId = 2;
    Payload payload = 3;
}

message Payload {
  oneof value {
    Hello b = 1;
    VfoState vfoState = 2;
  }
}

message VfoState {
  uint64 frequency = 1;
  string VfoMode = 2;
}

message Hello {
  uint32 protocolVersionMajor = 1;
  uint32 protocolVersionMinor = 2;
}

enum VfoMode {
  AM = 0;
  CW = 1;
  USB = 2;
  LSB = 3;
  RTTY = 4;
  FM = 5;
  WFM = 6;
  CWR = 7;
  RTTYR = 8;
  AMS = 9;
  PKTLSB = 10;
  PKTUSB = 11;
  PKTFM = 12;
  ECSSUSB = 13;
  EXSSLSB = 14;
  FAX = 15;
  SAM = 16;
  DSB = 17;
  FMN = 18;
  PKTAM = 19;
  P25 = 20;
  DSTAR = 21;
  DPMR = 22;
  NXDNVN = 23;
  NXDN_N = 24;
  DCR = 25;
  AMN = 26;
  PSK = 27;
  PSKR = 28;
  DD = 29;
  C4FM = 30;
  PKTFMN = 31;
  SPEC = 32;
  CWN = 33;
}
